name: Firely Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  firely:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Generate resources
        shell: pwsh
        run: .\scripts\build-sushi.ps1

      - name: Install Firely Terminal
        shell: pwsh
        run: dotnet tool install --global Firely.Terminal

      - name: Add dotnet tools to PATH
        shell: pwsh
        run: echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Validate generated resources
        shell: pwsh
        run: .\scripts\validate-firely.ps1

