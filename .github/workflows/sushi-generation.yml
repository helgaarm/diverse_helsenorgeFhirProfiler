name: SUSHI Generation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sushi:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate resources
        shell: pwsh
        run: .\scripts\build-sushi.ps1

      - name: Verify generated JSON is committed
        shell: pwsh
        run: |
          $changes = git status --short fsh-generated/resources
          if ($changes) {
            Write-Error "Generated JSON is not up to date. Run .\scripts\build-sushi.ps1 and commit fsh-generated/resources."
          }

